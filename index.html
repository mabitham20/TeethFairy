<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tooth Fairy Food Catcher 🧚</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(180deg, #1a0533 0%, #2d0a5e 40%, #0a1a4a 100%);
    font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Segoe UI", Tahoma, sans-serif;
    user-select: none;
    touch-action: none;
  }

  /* ══════════════════════════════════════
     STARS CANVAS
  ══════════════════════════════════════ */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
  }

  /* ══════════════════════════════════════
     HUD — top bar
  ══════════════════════════════════════ */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    z-index: 100;
    gap: 10px;
  }
  #hud .title {
    font-size: 20px;
    font-weight: 800;
    color: #f9e4ff;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1 1 auto;
  }
  #hud-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.15;
    flex: 0 0 auto;
  }
  #score-wrap {
    font-size: 20px;
    font-weight: 700;
    color: #ffe94d;
    white-space: nowrap;
  }
  #target-text {
    font-size: 13px;
    color: #ffe94d;
    opacity: 0.7;
    font-weight: 600;
  }
  #timer-wrap {
    font-size: 13px;
    font-weight: 700;
    color: #8de6ff;
    white-space: nowrap;
  }
  #timer-wrap.low { color: #ff6b6b; }
  #health-wrap {
    display: flex;
    gap: 6px;
    align-items: center;
    flex: 0 0 auto;
  }
  .tooth-life {
    font-size: 28px;
    line-height: 1;
    transition: opacity 0.3s, filter 0.3s;
  }
  .tooth-life.lost {
    opacity: 0.2;
    filter: grayscale(1);
  }

  /* ══════════════════════════════════════
     GAME AREA
  ══════════════════════════════════════ */
  #game-area {
    position: fixed;
    top: 60px;
    left: 0; right: 0; bottom: 0;
    overflow: hidden;
    z-index: 1;
  }

  /* ══════════════════════════════════════
     FAIRY
  ══════════════════════════════════════ */
  #fairy {
    position: absolute;
    width: 120px;
    height: 120px;
    pointer-events: none;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 18px #c77dffcc);
  }
  #fairy-emoji {
    font-size: 90px;
    line-height: 1;
    font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  }
  #fairy img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* ══════════════════════════════════════
     FALLING FOOD ITEMS
  ══════════════════════════════════════ */
  .food-item {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    transform: translateX(-50%);
    z-index: 5;
  }
  .food-emoji-el {
    font-size: 64px;
    line-height: 1;
    font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
    display: block;
    text-align: center;
  }
  .food-item img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    display: block;
  }
  .food-label {
    margin-top: 4px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: rgba(0,0,0,0.7);
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
    font-family: "Segoe UI", sans-serif;
  }

  /* ══════════════════════════════════════
     CATCH BURST TEXT
  ══════════════════════════════════════ */
  .burst {
    position: absolute;
    font-size: 28px;
    font-weight: 900;
    pointer-events: none;
    transform: translateX(-50%);
    z-index: 20;
    white-space: nowrap;
    animation: burst-up 0.9s ease-out forwards;
    text-shadow: 0 2px 8px #000c;
    font-family: "Segoe UI", sans-serif;
  }
  @keyframes burst-up {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1);   }
    60%  { opacity: 1; transform: translateX(-50%) translateY(-60px) scale(1.3); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-110px) scale(0.8); }
  }
  .burst.good    { color: #7aff7a; }
  .burst.bad     { color: #ff4f4f; }
  .burst.neutral { color: #ffd54d; }

  /* ══════════════════════════════════════
     SPARKLES
  ══════════════════════════════════════ */
  .sparkle {
    position: absolute;
    font-size: 22px;
    pointer-events: none;
    z-index: 15;
    animation: sparkle-fade 0.7s ease-out forwards;
    font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  }
  @keyframes sparkle-fade {
    0%   { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.2) translateY(-40px); }
  }

  /* ══════════════════════════════════════
     INFO CARD (top popup)
  ══════════════════════════════════════ */
  #info-card {
    position: fixed;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    width: min(420px, calc(100vw - 32px));
    background: rgba(8, 2, 26, 0.96);
    border: 1px solid rgba(200,150,255,0.45);
    border-radius: 20px;
    padding: 18px 22px;
    z-index: 500;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 40px rgba(140,0,255,0.3);
    animation: card-in 0.3s ease-out;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-24px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  #info-card .ci {
    font-size: 46px; margin-bottom: 6px;
    font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  }
  #info-card .cn {
    font-size: 18px; font-weight: 800; color: #f0d0ff; margin-bottom: 5px;
    font-family: "Segoe UI", sans-serif;
  }
  #info-card .ct {
    font-size: 12px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; margin-bottom: 8px;
    font-family: "Segoe UI", sans-serif;
  }
  #info-card .ct.good    { color: #7aff7a; }
  #info-card .ct.bad     { color: #ff6060; }
  #info-card .ct.neutral { color: #ffd54d; }
  #info-card .cd {
    font-size: 14px; line-height: 1.6; color: #ccc;
    font-family: "Segoe UI", sans-serif;
  }

  /* ══════════════════════════════════════
     FULL-SCREEN OVERLAY SCREENS
  ══════════════════════════════════════ */
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 400;
    text-align: center;
    padding: 30px 20px;
    background: linear-gradient(180deg, rgba(26,5,51,0.97) 0%, rgba(10,26,74,0.97) 100%);
    backdrop-filter: blur(6px);
    overflow-y: auto;
  }
  .big-emoji {
    font-size: 90px;
    line-height: 1;
    margin-bottom: 16px;
    font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  }
  .screen h1 {
    font-size: 44px;
    font-weight: 900;
    color: #f0d0ff;
    margin-bottom: 10px;
    text-shadow: 0 0 40px #c77dff;
    line-height: 1.15;
    font-family: "Segoe UI", sans-serif;
  }
  .screen > p {
    font-size: 17px;
    color: #ccc;
    margin-bottom: 18px;
    max-width: 440px;
    line-height: 1.6;
    font-family: "Segoe UI", sans-serif;
  }
  .btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, #7b2fff, #c77dff);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    margin: 6px;
    box-shadow: 0 5px 24px rgba(140,0,255,0.5);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    font-family: "Segoe UI", sans-serif;
    letter-spacing: 0.5px;
  }
  .btn:hover  { transform: scale(1.06); box-shadow: 0 8px 32px rgba(140,0,255,0.7); }
  .btn:active { transform: scale(0.96); }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn.small { padding: 10px 26px; font-size: 15px; }
  .btn.secondary { background: linear-gradient(135deg, #3a3a55, #5c5c85); box-shadow: 0 5px 20px rgba(0,0,0,0.35); }
  .final-score {
    font-size: 70px;
    font-weight: 900;
    color: #c77dff;
    text-shadow: 0 0 30px #c77dff;
    margin: 8px 0 4px;
    line-height: 1;
    font-family: "Segoe UI", sans-serif;
  }
  .score-label {
    font-size: 15px;
    color: #aaa;
    margin-bottom: 20px;
    font-family: "Segoe UI", sans-serif;
  }

  /* ── Level select cards ── */
  #level-list {
    width: min(440px, 92vw);
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 10px;
  }
  .level-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 16px;
    padding: 14px 18px;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    transition: border-color 0.15s;
  }
  .level-card.cleared { border-color: rgba(122,255,122,0.5); }
  .level-card.locked  { opacity: 0.45; }
  .lc-info { flex: 1 1 auto; min-width: 0; }
  .lc-num {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #c77dff;
  }
  .lc-name {
    font-size: 16px;
    font-weight: 800;
    color: #f0d0ff;
    margin: 2px 0 4px;
    font-family: "Segoe UI", sans-serif;
  }
  .lc-obj {
    font-size: 12.5px;
    color: #bbb;
    line-height: 1.4;
    font-family: "Segoe UI", sans-serif;
  }
  .lc-check { font-size: 13px; color: #7aff7a; font-weight: 700; margin-top: 4px; }

  /* ══════════════════════════════════════
     MOBILE  ≤ 600px
  ══════════════════════════════════════ */
  @media (max-width: 600px) {
    #hud            { height: 52px; padding: 0 12px; }
    #hud .title     { font-size: 14px; }
    #score-wrap     { font-size: 15px; }
    #target-text    { font-size: 11px; }
    #timer-wrap     { font-size: 11px; }
    .tooth-life     { font-size: 20px; }
    #game-area      { top: 52px; }

    #fairy          { width: 68px; height: 68px; }
    #fairy-emoji    { font-size: 54px; }

    .food-emoji-el  { font-size: 40px; }
    .food-item img  { width: 46px; height: 46px; }
    .food-label     { font-size: 10px; padding: 2px 7px; }

    .burst          { font-size: 18px; }
    .sparkle        { font-size: 15px; }

    .big-emoji      { font-size: 60px; margin-bottom: 10px; }
    .screen h1      { font-size: 28px; }
    .screen > p     { font-size: 14px; }
    .btn            { font-size: 15px; padding: 12px 32px; }
    .final-score    { font-size: 52px; }

    .lc-name        { font-size: 14.5px; }
    .lc-obj         { font-size: 11.5px; }
    .btn.small      { font-size: 13px; padding: 8px 18px; }

    #info-card       { top: 58px; padding: 12px 16px; border-radius: 16px; }
    #info-card .ci  { font-size: 30px; margin-bottom: 3px; }
    #info-card .cn  { font-size: 14px; margin-bottom: 3px; }
    #info-card .ct  { font-size: 10px; margin-bottom: 5px; }
    #info-card .cd  { font-size: 11.5px; line-height: 1.45; }
  }

  /* ══════════════════════════════════════
     TABLET  601px – 1023px
  ══════════════════════════════════════ */
  @media (min-width: 601px) and (max-width: 1023px) {
    #hud            { height: 58px; }
    #hud .title     { font-size: 17px; }
    #score-wrap     { font-size: 17px; }
    .tooth-life     { font-size: 26px; }
    #game-area      { top: 58px; }

    #fairy          { width: 90px; height: 90px; }
    #fairy-emoji    { font-size: 70px; }

    .food-emoji-el  { font-size: 50px; }
    .food-item img  { width: 58px; height: 58px; }

    .big-emoji      { font-size: 78px; }
    .screen h1      { font-size: 38px; }
    .screen > p     { font-size: 16px; }
    .btn            { font-size: 17px; padding: 13px 36px; }
    .final-score    { font-size: 64px; }

    #info-card      { top: 66px; }
  }

  /* ══════════════════════════════════════
     RED FLASH overlay
  ══════════════════════════════════════ */
  #red-flash {
    position: fixed;
    inset: 0;
    background: rgba(255,0,0,0.22);
    pointer-events: none;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.08s;
  }
  #red-flash.show { opacity: 1; }
</style>
</head>
<body>

<!-- Stars -->
<canvas id="stars-canvas"></canvas>

<!-- Red flash -->
<div id="red-flash"></div>

<!-- HUD -->
<div id="hud">
  <div class="title" id="hud-title">🧚 Tooth Fairy</div>
  <div id="hud-center">
    <div id="score-wrap">⭐ <span id="score-val">0</span><span id="target-text"></span></div>
    <div id="timer-wrap" style="display:none">⏱ <span id="timer-val">--</span>s</div>
  </div>
  <div id="health-wrap">
    <span class="tooth-life" id="h1">🦷</span>
    <span class="tooth-life" id="h2">🦷</span>
    <span class="tooth-life" id="h3">🦷</span>
  </div>
</div>

<!-- Game area -->
<div id="game-area">
  <div id="fairy">
    <span id="fairy-emoji">🧚‍♀️</span>
  </div>
</div>

<!-- START / LEVEL SELECT SCREEN -->
<div id="start-screen" class="screen">
  <div class="big-emoji">🧚‍♀️</div>
  <h1>Tooth Fairy<br>Food Catcher</h1>
  <p>Choose a level to begin!</p>
  <div id="level-list"></div>
</div>

<!-- LEVEL CLEAR SCREEN -->
<div id="levelclear-screen" class="screen" style="display:none">
  <div class="big-emoji">🎉</div>
  <h1 id="lc-title">Level Complete!</h1>
  <p>Nice catching! Here's your score:</p>
  <div class="final-score" id="lc-score">0</div>
  <div class="score-label">Score</div>
  <div>
    <button class="btn" id="lc-next-btn" onclick="nextLevel()">Next Level ➡️</button>
    <button class="btn secondary" onclick="goToLevelSelect()">Level Select</button>
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div id="gameover-screen" class="screen" style="display:none">
  <div class="big-emoji">💔</div>
  <h1 id="gameover-title">Level Failed!</h1>
  <p id="gameover-msg">Give it another shot!</p>
  <div class="final-score" id="final-score">0</div>
  <div class="score-label">Final Score</div>
  <div>
    <button class="btn" onclick="retryLevel()">Try Again 🔁</button>
    <button class="btn secondary" onclick="goToLevelSelect()">Level Select</button>
  </div>
</div>

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Unlock audio on the first user interaction (mobile autoplay policies)
function unlockAudio() {
  getAudioCtx();
  [sndYes, sndNo].forEach(a => {
    const p = a.play();
    if (p && p.catch) p.then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
  });
  document.removeEventListener('click', unlockAudio);
  document.removeEventListener('touchstart', unlockAudio);
}
document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true });

function playClip(audioEl) {
  try {
    audioEl.currentTime = 0;
    const p = audioEl.play();
    if (p && p.catch) p.catch(() => {});
  } catch (e) {}
}

// Neutral catch has no uploaded clip, so it's synthesised: a short, soft
// "meh" blip that sits tonally between the yes/no clips.
function playNeutralTone() {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, now);
    osc.frequency.linearRampToValueAtTime(460, now + 0.14);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.26);
  } catch (e) {}
}

function playCatchSound(points) {
  if (points > 0)      playClip(sndYes);
  else if (points < 0) playClip(sndNo);
  else                  playNeutralTone();
}

  } else if (w <= 1023) {

   STARS
════════════════════════════════════════════ */
const sc  = document.getElementById('stars-canvas');
const sct = sc.getContext('2d');
let stars = [];

function resizeStars() {
  sc.width  = window.innerWidth;
  sc.height = window.innerHeight;
  stars = Array.from({length: 160}, () => ({
    x:  Math.random() * sc.width,
    y:  Math.random() * sc.height,
    r:  Math.random() * 1.4 + 0.3,
    a:  Math.random(),
    da: (Math.random() - 0.5) * 0.007,
  }));
}
function drawStars() {
  sct.clearRect(0, 0, sc.width, sc.height);
  stars.forEach(s => {
    s.a += s.da;
    if (s.a <= 0.08 || s.a >= 1) s.da *= -1;
    sct.beginPath();
    sct.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sct.fillStyle = `rgba(255,255,255,${s.a.toFixed(2)})`;
    sct.fill();
  });
}
resizeStars();

/* ── Fairy position helpers ── */
function hudHeight()    { return window.innerWidth <= 600 ? 52 : window.innerWidth <= 1023 ? 58 : 60; }
function gameAreaH()    { return window.innerHeight - hudHeight(); }
function fairyYpos()    { return gameAreaH() - FAIRY_FROM_BTM; }

function moveFairy(x) {
  const half = window.innerWidth <= 600 ? 34 : window.innerWidth <= 1023 ? 45 : 60;
  fairyX = Math.max(half, Math.min(window.innerWidth - half, x));
  fairyEl.style.left = fairyX + 'px';
  fairyEl.style.top  = fairyYpos() + 'px';
}

/* ── Input ── */
window.addEventListener('mousemove', e => {

});
window.addEventListener('touchstart', e => {
  if (gameState === 'playing') targetX = e.touches[0].clientX;
}, {passive:true});
window.addEventListener('touchmove', e => {
  if (gameState === 'playing') { e.preventDefault(); targetX = e.touches[0].clientX; }
}, {passive:false});

  resizeStars();

════════════════════════════════════════════ */
function renderLevelCards() {
  const list = document.getElementById('level-list');
  list.innerHTML = LEVELS.map((lvl, idx) => {
    const locked  = !unlockedLevels[idx];
    const cleared = unlockedLevels[idx + 1] === true;
    return `
      <div class="level-card ${locked ? 'locked' : ''} ${cleared ? 'cleared' : ''}">
        <div class="lc-info">
          <div class="lc-num">Level ${lvl.id}</div>
          <div class="lc-name">${lvl.shortName}</div>
          <div class="lc-obj">${lvl.subtitle}</div>
          ${cleared ? '<div class="lc-check">✅ Cleared</div>' : ''}
        </div>
        <button class="btn small" ${locked ? 'disabled' : ''} onclick="startLevel(${idx})">
          ${locked ? '🔒' : 'Play ▶'}
        </button>
      </div>`;
  }).join('');
}

function goToLevelSelect() {
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('levelclear-screen').style.display = 'none';
  gameState = 'start';
  renderLevelCards();
  document.getElementById('start-screen').style.display = 'flex';
  idleLoop();
}

/* ════════════════════════════════════════════
   SPAWN
════════════════════════════════════════════ */
function pickWeighted(pool) {
  const total = pool.reduce((s, it) => s + it.weight, 0);
  let r = Math.random() * total;
  for (const it of pool) {
    if (r < it.weight) return it;
    r -= it.weight;
  }
  return pool[pool.length - 1];
}

function spawnFood() {
  const data = pickWeighted(currentLevel.items);

  const margin = 70;
  const x      = margin + Math.random() * (window.innerWidth - margin * 2);
  const elapsed = (Date.now() - startTime) / 1000;
  const speed  = 1.5 + elapsed * 0.02 + Math.random() * 0.9;

  const el = document.createElement('div');
  el.className  = 'food-item';
  el.style.left = x + 'px';
  el.style.top  = '-100px';
  el.innerHTML  = `<span class="food-emoji-el">${data.emoji}</span><span class="food-label">${data.name}</span>`;
  gameArea.appendChild(el);

  items.push({ el, x, y: -100, speed, data, caught: false });
}

function showBurst(x, y, text, cls) {
  const b = document.createElement('div');
  b.className   = `burst ${cls}`;
  b.textContent = text;
  b.style.left  = x + 'px';
  b.style.top   = y + 'px';
  gameArea.appendChild(b);
  setTimeout(() => b.remove(), 950);
}

function showSparkles(x, y) {
  ['✨','⭐','💫','🌟'].forEach((ch, i) => {
    const s = document.createElement('div');
    s.className   = 'sparkle';
    s.textContent = ch;
    s.style.left  = (x + (Math.random()-0.5)*90) + 'px';
    s.style.top   = (y + (Math.random()-0.5)*50) + 'px';
    s.style.animationDelay = (i * 65) + 'ms';
    gameArea.appendChild(s);
    setTimeout(() => s.remove(), 800);
  });
}

function flashRed() {
  const f = document.getElementById('red-flash');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 280);
}

/* ════════════════════════════════════════════
   INFO CARD
════════════════════════════════════════════ */
function cardMeta(points) {
  if (points > 0) return { cls: 'good',    label: '✅ Good catch!' };
  if (points < 0) return { cls: 'bad',     label: '❌ Bad catch!' };
  return              { cls: 'neutral', label: '🟡 Neutral catch' };
}

function showCard(data) {
  clearCard();
  const c = document.createElement('div');
  c.id = 'info-card';
  const meta = cardMeta(data.points);
  const ptsText = data.points > 0 ? `+${data.points} pts` : `${data.points} pts`;
  const headline = data.sub ? `${data.sub} — ${data.tagline}` : data.tagline;
  c.innerHTML = `
    <div class="ci">${data.emoji}</div>
    <div class="cn">${data.name}</div>
    <div class="ct ${meta.cls}">${meta.label} (${ptsText})</div>
    <div class="cd"><strong>${headline}</strong><br>${data.detail}</div>`;
  document.body.appendChild(c);
  clearTimeout(infoTimer);
  infoTimer = setTimeout(clearCard, 4200);
}
function clearCard() {
  const c = document.getElementById('info-card');
  if (c) c.remove();
}

/* ════════════════════════════════════════════
   HUD
════════════════════════════════════════════ */
function updateHealth() {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('h'+i);
    if (currentLevel.lives === null) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.classList.toggle('lost', i > lives);
    }
  }
}

function updateScoreDisplay() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('target-text').textContent = ` / ${currentLevel.targetScore}`;
}

function updateTimerDisplay() {
  const wrap = document.getElementById('timer-wrap');
  if (currentLevel.timeLimit === null) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = '';
  document.getElementById('timer-val').textContent = Math.max(0, timeLeft);
  wrap.classList.toggle('low', timeLeft <= 10);
}

function updateHUDForLevel() {
  document.getElementById('hud-title').textContent = `🧚 ${currentLevel.shortName}`;
  updateScoreDisplay();
  updateTimerDisplay();
  updateHealth();
}

/* ════════════════════════════════════════════
   MAIN LOOP
════════════════════════════════════════════ */
function loop(ts) {
  if (gameState !== 'playing') return;
  drawStars();

  fairyX += (targetX - fairyX) * 0.15;
  moveFairy(fairyX);

  if (ts - lastSpawn > spawnMs) {
    spawnFood();
    lastSpawn = ts;
    spawnMs   = Math.max(700, spawnMs - 8);
  }

  const fy = fairyYpos();

  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (it.caught) continue;

    it.y += it.speed;
    it.el.style.top = it.y + 'px';

    if (Math.abs(it.x - fairyX) < CATCH_R && Math.abs(it.y - fy) < CATCH_R) {
      it.caught = true;
      it.el.remove();
      items.splice(i, 1);

      const data = it.data;
      showCard(data);
      playCatchSound(data.points);
      score = Math.max(0, score + data.points);
      updateScoreDisplay();

      if (data.points > 0) {
        showBurst(it.x, fy - 50, `+${data.points} ⭐`, 'good');
        showSparkles(it.x, fy);
      } else if (data.points < 0) {
        showBurst(it.x, fy - 50, `${data.points} pts`, 'bad');
        flashRed();
        if (currentLevel.lives !== null) {
          lives--;
          updateHealth();
          if (lives <= 0) { setTimeout(() => endLevel(false), 600); return; }
        }
      } else {
        showBurst(it.x, fy - 50, '0 pts', 'neutral');
      }

      if (score >= currentLevel.targetScore) {
        setTimeout(() => endLevel(true), 400);
        return;
      }
      continue;
    }

    if (it.y > gameAreaH() + 80) {
      it.el.remove();
      items.splice(i, 1);
    }
  }

  raf = requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════
   GAME CONTROL
════════════════════════════════════════════ */
function startLevel(idx) {
  if (!unlockedLevels[idx]) return;
  currentLevelIdx = idx;
  currentLevel    = LEVELS[idx];

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('levelclear-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';

  gameState  = 'playing';
  score      = 0;
  lives      = currentLevel.lives === null ? null : currentLevel.lives;
  timeLeft   = currentLevel.timeLimit;
  items.forEach(it => it.el.remove());
  items      = [];
  lastSpawn  = 0;
  spawnMs    = currentLevel.spawnMs;
  startTime  = Date.now();

  updateHUDForLevel();

  fairyX  = window.innerWidth / 2;
  targetX = fairyX;
  moveFairy(fairyX);

  if (timerId) clearInterval(timerId);
  if (currentLevel.timeLimit !== null) {
    timerId = setInterval(() => {
      if (gameState !== 'playing') return;
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        clearInterval(timerId);
        if (score < currentLevel.targetScore) endLevel(false);
      }
    }, 1000);
  }

  raf = requestAnimationFrame(loop);
}

function endLevel(won) {
  gameState = 'over';
  cancelAnimationFrame(raf);
  if (timerId) clearInterval(timerId);
  items.forEach(it => it.el.remove());
  items = [];
  clearCard();

  if (won) {
    if (currentLevelIdx + 1 < LEVELS.length) unlockedLevels[currentLevelIdx + 1] = true;
    document.getElementById('lc-title').textContent = `${currentLevel.shortName} Complete!`;
    document.getElementById('lc-score').textContent = score;
    const hasNext = currentLevelIdx + 1 < LEVELS.length;
    document.getElementById('lc-next-btn').style.display = hasNext ? 'inline-block' : 'none';
    document.getElementById('levelclear-screen').style.display = 'flex';
  } else {
    document.getElementById('gameover-title').textContent = 'Level Failed!';
    document.getElementById('gameover-msg').textContent =
      currentLevel.lives !== null && lives <= 0
        ? 'All your teeth are gone! Try again.'
        : "Time's up! You didn't reach the target score.";
    document.getElementById('final-score').textContent = score;
    document.getElementById('gameover-screen').style.display = 'flex';
  }
  idleLoop();
}

function nextLevel() {
  startLevel(currentLevelIdx + 1);
}
function retryLevel() {
  startLevel(currentLevelIdx);
}

/* ════════════════════════════════════════════
   IDLE STAR LOOP (menus / end screens)
════════════════════════════════════════════ */
function idleLoop() {
  if (gameState === 'playing') return;
  drawStars();
  requestAnimationFrame(idleLoop);
}

renderLevelCards();
idleLoop();
</script>
